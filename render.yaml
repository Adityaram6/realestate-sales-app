# Render Blueprint: one web service running the NestJS api + BullMQ workers.
# Postgres comes from Supabase (external, free forever).
# Redis comes from Upstash (external, free tier).
# Env vars are entered manually in the Render dashboard after first deploy.

services:
  - type: web
    name: realestate-sales-api
    env: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter api prisma:generate && pnpm --filter api build
    startCommand: cd apps/api && sh scripts/deploy-db.sh && node dist/main.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: USE_MOCK_AI
        value: "true"
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-5
      - key: AI_DAILY_REQUEST_LIMIT
        value: "50"
      - key: AI_DAILY_TOKEN_LIMIT
        value: "50000"
      - key: SMS_PROVIDER
        value: msg91
      - key: META_GRAPH_VERSION
        value: v21.0
      # These you paste manually in the Render dashboard (sensitive):
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
